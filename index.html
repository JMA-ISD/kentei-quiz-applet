<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>展示会クイズラリー</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* 全画面を固定し、スクロールを完全に禁止 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* 画面の縦幅(vh)を基準に固定し、絶対に潰れないようにする */
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
        }

        /* 全体を覆うメインコンテナ（画面の縦幅を100%使う） */
        .fullscreen-container {
            width: 100%;
            height: 100vh;
            max-width: 1024px;
            margin: 0 auto;
            padding: 6vh 6vw; /* 上下の余白もvhで最適化 */
            display: flex;
            flex-direction: column;
        }

        .hide {
            display: none !important;
        }

        /* ----------------------------------
         * 各画面の共通レイアウト（flex-growで縦に引き伸ばす）
         * ---------------------------------- */
        .screen-wrapper {
            width: 100%;
            flex-grow: 1; /* 潰れを防止し、画面の残りの高さを目一杯使う */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 上中下に綺麗に要素を振り分ける */
            align-items: center;
        }

        /* ----------------------------------
         * ロゴ・ロゴタイプ配置エリア
         * ---------------------------------- */
        .brand-logo-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5vh;
            width: 100%;
        }

        .logo-mark {
            height: 10vh;
            max-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-type {
            height: 4vh;
            max-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand-logo-zone svg {
            width: auto;
            height: 100%;
            max-width: 100%;
        }

        /* 開発用の一時的な点線枠 */
        .placeholder-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
        }

        /* ----------------------------------
         * タイトル・文字の装飾
         * ---------------------------------- */
        h1.main-title {
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            color: #fff;
            letter-spacing: 2px;
            line-height: 1.3;
            text-align: center;
            margin: 2vh 0;
        }

        p.catchphrase {
            font-size: 1.5rem;
            color: #e0e6ed;
            line-height: 1.8;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 2vh;
        }

        /* 進行状況（上部に固定） */
        .quiz-header {
            width: 100%;
            text-align: center;
        }
        .progress-badge {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 問題文エリア（画面中央にどっしり構える） */
        .question-zone {
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vh 0;
        }
        .question-text {
            font-size: 2.4rem;
            font-weight: bold;
            line-height: 1.5;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* 選択肢ボタン（画面下部に綺麗に収まる） */
        .choices-zone {
            width: 100%;
        }

        .btn-choice {
            display: block;
            width: 100%;
            padding: 3vh 30px; /* 高さを微調整 */
            margin-bottom: 2vh;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 18px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #1e3c72;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: all 0.1s ease;
        }
        .btn-choice:active {
            transform: scale(0.98);
            background: #ffcc00;
            color: #000;
        }
        .btn-choice:last-child {
            margin-bottom: 0;
        }

        /* デカすぎるスタート＆リスタートボタン */
