<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>展示会クイズラリー</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* 全画面を固定し、スクロールを完全に禁止 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        /* 展示会場で目を引く、濃度の高いリッチなグラデーション背景 */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 画面全体を覆うメインコンテナ */
        .fullscreen-container {
            width: 100%;
            height: 100%;
            max-width: 1024px;
            padding: 5vh 6vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .hide {
            display: none !important;
        }

        /* ----------------------------------
         * 各画面の共通レイアウト
         * ---------------------------------- */
        .screen-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ----------------------------------
         * 新設：ロゴ・ロゴタイプ配置エリア
         * ---------------------------------- */
        .brand-logo-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5vh;       /* ロゴマークとロゴタイプの間の余白 */
            margin-bottom: 3vh; /* ロゴエリア全体の階層下の余白 */
            width: 100%;
        }

        /* ロゴマーク（シンボル）のサイズ固定枠 */
        .logo-mark {
            height: 12vh;    /* 画面の高さ12%を上限にする（間延び防止） */
            max-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ロゴタイプ（社名などの文字）のサイズ固定枠 */
        .logo-type {
            height: 4vh;     /* 画面の高さ4%を上限にする */
            max-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 挿入されたSVGが枠をはみ出さず、縦横比を維持して綺麗に収まる指定 */
        .brand-logo-zone svg {
            width: auto;
            height: 100%;
            max-width: 100%;
        }

        /* 開発用の一時的な点線枠（SVGを入れたら自動で消えます） */
        .placeholder-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
        }

        /* ----------------------------------
         * タイトル・文字の装飾
         * ---------------------------------- */
        h1.main-title {
            font-size: 3.2rem;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 2vh;
            color: #fff;
            letter-spacing: 2px;
            line-height: 1.3;
            text-align: center;
        }

        p.catchphrase {
            font-size: 1.5rem;
            color: #e0e6ed;
            line-height: 1.8;
            margin-bottom: 4vh;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* 進行状況（上部に固定） */
        .quiz-header {
            width: 100%;
            text-align: center;
            margin-bottom: 2vh;
        }
        .progress-badge {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 問題文エリア */
        .question-zone {
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vh 0;
        }
