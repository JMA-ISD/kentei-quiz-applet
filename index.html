<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>検定クイズアプリ</title></title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* 基本リセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* 画面全体の固定（ここで大枠を中央寄せ） */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 縦長画面でも間延びさせないための外枠ガード */
        .app-boundary {
            width: 100%;
            height: 100%;
            max-width: 800px;  /* 横に広がりすぎない */
            max-height: 900px; /* 縦に間延びしすぎない */
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 中身を上下中央に配置 */
            align-items: center;
        }

        .hide { display: none !important; }

        /* 各画面の共通レイアウト（要素を中央にギュッと集める） */
        .screen-layout {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 35px; /* 要素どうしの心地よい垂直間隔 */
            text-align: center;
        }

        /* ロゴタイプ配置エリア */
        .main-logo-type {
            width: 100%;
            height: 20vh;
            max-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .main-logo-type svg {
            width: auto;
            height: 100%;
            max-width: 100%;
        }

        /* 仮の点線枠 */
        .placeholder-svg {
            border: 2px dashed rgba(255,255,255,0.3);
            padding: 20px 40px;
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            border-radius: 10px;
        }

        /* 文字装飾 */
        .catchphrase {
            font-size: 1.6rem;
            line-height: 1.6;
            color: #e0e6ed;
        }

        .progress-badge {
            background: rgba(255,255,255,0.15);
            padding: 10px 35px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .question-text {
            font-size: 2.4rem;
            font-weight: bold;
            line-height: 1.5;
        }

        /* 選択肢ボタン */
        .choices-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-choice {
            width: 100%;
            padding: 25px 30px;
            background: #fff;
            border: none;
            border-radius: 15px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #1e3c72;
            text-align: left;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .btn-choice:active {
            transform: scale(0.97);
            background: #ffcc00;
            color: #000;
        }

        /* デカいアクションボタン */
        .btn-start {
            width: 100%;
            max-width: 400px;
            padding: 22px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255,65,108,0.4);
        }
        .btn-start:active { transform: scale(0.95); }

        /* 結果画面専用 */
        .result-title {
            font-size: 2.8rem;
            letter-spacing: 2px;
        }
        .score-num {
            font-size: 7.5rem;
            font-weight: 900;
            color: #ffcc00;
            line-height: 1;
        }
        .result-comment {
            font-size: 1.5rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="app-boundary">
        
        <div id="start-screen" class="screen-layout">
            <div class="main-logo-type">
                <img src="logo.svg">
            </div>
            <p class="catchphrase">
                検定3級レベルの問題全5問に答えて<br>
                自分の実力を試そう
            </p>
            <button class="btn-start" onclick="startQuiz()">挑戦を始める</button>
        </div>

        <div id="quiz-screen" class="screen-layout hide">
            <div class="progress-badge" id="progress-text">Q 1 / 5</div>
            <div class="question-text" id="question-text">問題文がここに入ります</div>
            <div class="choices-container" id="choices-container">
                </div>
        </div>

        <div id="result-screen" class="screen-layout hide">
            <h2 class="result-title">RESULT</h2>
            <div class="score-num" id="result-score">0 / 5</div>
            <p class="result-comment" id="result-comment"></p>
            <button class="btn-start" onclick="resetQuiz()">最初に戻る</button>
        </div>

    </div>

    <script>
        const quizData = [
          {
            question: "市場を共通のニーズを持つ顧客グループに細分化することを何と呼ぶでしょう？",
            choices: ["セグメンテーション", "ターゲティング", "ポジショニング"],
            correct: 0
          },
          {
            question: "企業や商品が持つ、目に見えない資産価値（ブランドの持つ資産的価値）を何と呼ぶでしょう？",
            choices: ["ブランド・ロイヤルティ", "ブランド・エクイティ", "ブランド・アイデンティティ"],
            correct: 1
          },
          {
            question: "生産者から消費者まで商品を届けるための一連のルートやネットワークを何と呼ぶでしょう？",
            choices: ["流通チャネル", "サプライチェーン", "ロジスティクス"],
            correct: 0
          },
          {
            question: "アンケートなどで「数値」として集計・分析できるデータの調査を何と呼ぶでしょう？",
            choices: ["定性調査", "定量調査", "統計学的リサーチ"],
            correct: 1
          },
          {
            question: "新商品の発売時に価格を高く設定し、初期の段階で利益を確保していく価格戦略を何と呼ぶでしょう？",
            choices: ["スキミング・プライシング", "ペネトレーション・プライシング", "ダイナミック・プライシング"],
            correct: 0
          }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer = null;

        const startS = document.getElementById('start-screen');
        const quizS = document.getElementById('quiz-screen');
        const resultS = document.getElementById('result-screen');

        function startQuiz() {
            startS.classList.add('hide');
            resultS.classList.add('hide');
            quizS.classList.remove('hide');
            currentIdx = 0; score = 0;
            showQuest();
        }

        function showQuest() {
            const data = quizData[currentIdx];
            document.getElementById('progress-text').innerText = `Q ${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('question-text').innerText = data.question;
            
            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            data.choices.forEach((c, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-choice';
                btn.innerText = `▶ ${c}`;
                btn.onclick = () => {
                    if(i === data.correct) score++;
                    currentIdx++;
                    if(currentIdx < quizData.length) showQuest(); else showResult();
                };
                container.appendChild(btn);
            });
        }

        function showResult() {
            quizS.classList.add('hide');
            resultS.classList.remove('hide');
            document.getElementById('result-score').innerText = `${score} / ${quizData.length}`;
            const comment = document.getElementById('result-comment');
            if(score === 5) comment.innerText = "パーフェクト！素晴らしいです！2級に挑戦してみては？";
            else if(score >= 3) comment.innerText = "3級合格圏内です！すぐにでも受験をおすすめします！";
            else comment.innerText = "ご参加ありがとうございました！\nもう一度挑戦して満点を目指しましょう！";
            
            timer = setTimeout(resetQuiz, 30000);
        }

        function resetQuiz() {
            if(timer) clearTimeout(timer);
            resultS.classList.add('hide');
            quizS.classList.add('hide');
            startS.classList.remove('hide');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(()=>{});
            });
        }
    </script>
</body>
</html>
